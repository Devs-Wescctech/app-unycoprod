services:
  app-unycoprod:
    image: ghcr.io/devs-wescctech/app-unycoprod:latest
    container_name: app-unycoprod
    restart: unless-stopped
    ports:
      - "5100:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - DATABASE_URL=postgresql://auth_bd:4uth%401307BD@172.17.0.1:5432/unycoprod
      - DB_SSL=false
      - TOTVS_API_TOKEN=dW5pY28uaW50ZWdyYToxbmljQCM=
      - VINDI_API_KEY=SUA_CHAVE_VINDI_AQUI
    volumes:
      - app-data:/app/server/data
    networks:
      - unycoprod-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  app-data:

networks:
  unycoprod-network:
    driver: bridge
