services:
  app-unycoprod:
    image: ghcr.io/devs-wescctech/app-unycoprod:latest
    container_name: app-unycoprod
    restart: unless-stopped
    ports:
      - "5100:5000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=5000
      - DB_SSL=false
    volumes:
      - app-data:/app/server/data
    networks:
      - unycoprod-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  app-data:

networks:
  unycoprod-network:
    driver: bridge
